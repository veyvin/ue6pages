name: UE AI Describer

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout public repo (scripts)
        uses: actions/checkout@v5
        with:
          path: public-repo

      - name: Checkout private repo (gh-pages)
        uses: actions/checkout@v5
        with:
          repository: veyvin/UnrealEngine
          ref: gh-pages
          token: ${{ secrets.PRIVATE_REPO_PAT }}
          path: private-repo

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: public-repo/scripts/ue-ai-describer/package-lock.json

      - name: Install dependencies
        working-directory: public-repo/scripts/ue-ai-describer
        run: npm ci

      - name: Install Playwright browsers
        working-directory: public-repo/scripts/ue-ai-describer
        run: npx playwright install --with-deps chromium

      - name: Run AI Describer
        working-directory: public-repo/scripts/ue-ai-describer
        env:
          TARGET_DIR: ${{ github.workspace }}/private-repo
        run: node index.js "$TARGET_DIR"

      - name: Commit and push changes to private repo
        working-directory: private-repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Update AI descriptions [skip ci]" || exit 0
          git push https://x-access-token:${{ secrets.PRIVATE_REPO_PAT }}@github.com/veyvin/UnrealEngine.git gh-pages
